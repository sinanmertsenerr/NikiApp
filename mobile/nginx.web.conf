# Niki web (react-native-web SPA) served by nginx.
#
# HTTPS: required for camera/QR (getUserMedia), PWA install, and the service
# worker. Either terminate TLS at an external load balancer (GCP HTTPS LB /
# Cloudflare) forwarding to this :80, OR uncomment the 443 server block below and
# mount real certificates. Plain HTTP works for local testing only.
#
# NOTE: nginx only inherits server-level add_header into a location that defines
# NO add_header of its own. Every location below sets Cache-Control, so the
# security headers are repeated per-location (otherwise they'd be silently
# dropped on the HTML document and assets).

server {
    listen 80;
    server_name niki.sinansener.com;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10M;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/wasm
        image/svg+xml;

    # SPA routing: web.output is "single", so every client route falls back to
    # index.html. The shell itself must NOT be cached (network-first via the SW).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        # CSP — connect-src MUST list both the https API origin and the wss socket
        # origin or API/socket calls break. style 'unsafe-inline' is required
        # (react-native-web injects inline styles). The SW-registration script is
        # an external /sw-register.js so script-src 'self' allows it.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://nikiapi.sinansener.com wss://nikiapi.sinansener.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Never cache the service worker or manifest (so updates roll out).
    location = /service-worker.js {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location = /sw-register.js {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Content-hashed immutable assets: cache hard.
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }
}

