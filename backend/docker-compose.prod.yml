version: '3.9'

services:
  # ==================== NGINX REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: niki_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend-network
      - backend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== CERTBOT (SSL) ====================
  certbot:
    image: certbot/certbot
    container_name: niki_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ==================== NESTJS API ====================
  api:
    image: niki-coffee-api:latest
    container_name: niki_api
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped

    # Security: No root, read-only filesystem
    user: "1001:1001"
    read_only: true

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

    # Security: Drop all capabilities
    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    # Temporary folders (writable)
    tmpfs:
      - /tmp:noexec,nosuid,size=100M

    volumes:
      - uploads_data:/app/uploads

    environment:
      - NODE_ENV=production
      - TZ=Europe/Istanbul

    env_file:
      - .env.production

    # Internal port only (nginx handles external)
    expose:
      - "3000"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - backend-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== POSTGRESQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: niki_postgres
    restart: unless-stopped

    # Security
    user: "999:999"
    read_only: true

    tmpfs:
      - /tmp
      - /run/postgresql

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nikiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
      POSTGRES_DB: ${POSTGRES_DB:-niki_coffee}
      PGDATA: /var/lib/postgresql/data/pgdata

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Internal only - no external port exposure
    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nikiuser} -d ${POSTGRES_DB:-niki_coffee}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - backend-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: niki_redis
    restart: unless-stopped

    # Security
    user: "999:999"
    read_only: true

    tmpfs:
      - /tmp

    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    # Internal only
    expose:
      - "6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend-network

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ==================== NETWORKS ====================
networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true  # No external access

# ==================== VOLUMES ====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
