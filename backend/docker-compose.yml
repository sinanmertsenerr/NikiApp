version: '3.8'

services:
  # ==================== API ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: niki_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      DATABASE_URL: postgresql://nikiuser:NikiSecure2025!@postgres:5432/niki_coffee?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_64_chars_minimum_required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_in_production_64_chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: https://niki.ieu.app
      PRODUCTION_APP_URL: https://api.niki.ieu.app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - niki-network
    volumes:
      - uploads_data:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==================== POSTGRESQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: niki_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nikiuser
      POSTGRES_PASSWORD: NikiSecure2025!
      POSTGRES_DB: niki_coffee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - niki-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nikiuser -d niki_coffee"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: niki_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - niki-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ==================== NETWORKS ====================
networks:
  niki-network:
    driver: bridge

# ==================== VOLUMES ====================
volumes:
  postgres_data:
  redis_data:
  uploads_data:
